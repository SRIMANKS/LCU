<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>leetGraph — Problem Graph</title>
    <link rel="icon" type="image/png" href="../node.png" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", "Segoe UI", sans-serif;
        background: #0d1117;
        overflow: hidden;
        color: #c9d1d9;
      }
      #container {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* ── Header ── */
      #header {
        background: #161b22;
        padding: 10px 18px 8px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
        z-index: 1000;
        border-bottom: 1px solid #30363d;
        flex-shrink: 0;
      }
      .header-top {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
      }
      .ship-link {
        margin-left: auto;
        font-size: 11px;
        color: #8b949e;
        text-decoration: none;
        font-weight: 500;
        border: 1px solid #30363d;
        border-radius: 999px;
        padding: 4px 10px;
        transition: all 0.2s ease;
        white-space: nowrap;
      }
      .ship-link:hover {
        color: #58a6ff;
        border-color: #58a6ff;
        background: rgba(88, 166, 255, 0.08);
      }
      h1 {
        color: #e6edf3;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: -0.2px;
        white-space: nowrap;
      }
      .controls-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: flex-end;
      }
      .ctrl {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .ctrl-label {
        font-size: 10px;
        color: #8b949e;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .ctrl-sep {
        width: 1px;
        background: #30363d;
        align-self: stretch;
        margin: 0 2px;
      }

      input[type="text"] {
        padding: 5px 10px;
        border: 1.5px solid #30363d;
        border-radius: 7px;
        font-size: 12px;
        background: #0d1117;
        color: #e6edf3;
        width: 155px;
        transition: border-color 0.2s;
        font-family: inherit;
      }
      input[type="text"]:focus {
        outline: none;
        border-color: #58a6ff;
      }

      /* Difficulty chips */
      .d-chips {
        display: flex;
        gap: 4px;
      }
      .d-chip {
        padding: 4px 11px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        border: 1.5px solid transparent;
        transition: all 0.2s;
        opacity: 0.4;
        user-select: none;
      }
      .d-chip:hover {
        opacity: 0.75;
      }
      .d-chip.active {
        opacity: 1;
      }
      .d-chip.all {
        background: #21262d;
        border-color: #30363d;
        color: #c9d1d9;
      }
      .d-chip.all.active {
        border-color: #58a6ff;
        background: rgba(88, 166, 255, 0.12);
        color: #58a6ff;
      }
      .d-chip.Easy {
        background: rgba(0, 184, 163, 0.1);
        border-color: rgba(0, 184, 163, 0.3);
        color: #00b8a3;
      }
      .d-chip.Easy.active {
        background: rgba(0, 184, 163, 0.22);
        border-color: #00b8a3;
      }
      .d-chip.Medium {
        background: rgba(255, 192, 30, 0.1);
        border-color: rgba(255, 192, 30, 0.3);
        color: #ffc01e;
      }
      .d-chip.Medium.active {
        background: rgba(255, 192, 30, 0.22);
        border-color: #ffc01e;
      }
      .d-chip.Hard {
        background: rgba(239, 71, 67, 0.1);
        border-color: rgba(239, 71, 67, 0.3);
        color: #ef4743;
      }
      .d-chip.Hard.active {
        background: rgba(239, 71, 67, 0.22);
        border-color: #ef4743;
      }

      /* Topic chip multi-select */
      .chip-filter {
        position: relative;
      }
      .chip-row {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 3px;
        background: #0d1117;
        border: 1.5px solid #30363d;
        border-radius: 7px;
        padding: 3px 8px;
        min-width: 200px;
        max-width: 360px;
        min-height: 30px;
        cursor: text;
        transition: border-color 0.2s;
      }
      .chip-row:focus-within {
        border-color: #58a6ff;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: #21262d;
        border: 1px solid #30363d;
        border-radius: 20px;
        padding: 2px 8px;
        font-size: 11px;
        color: #c9d1d9;
        white-space: nowrap;
      }
      .chip-x {
        cursor: pointer;
        opacity: 0.5;
        font-size: 13px;
        line-height: 1;
      }
      .chip-x:hover {
        opacity: 1;
        color: #ef4743;
      }
      .chip-search {
        border: none;
        outline: none;
        background: transparent;
        color: #e6edf3;
        font-size: 12px;
        width: 80px;
        font-family: inherit;
      }
      .chip-dd {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        min-width: 100%;
        max-width: 280px;
        background: #1c2128;
        border: 1px solid #30363d;
        border-radius: 9px;
        max-height: 200px;
        overflow-y: auto;
        z-index: 3000;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        display: none;
      }
      .chip-dd.open {
        display: block;
      }
      .chip-opt {
        padding: 6px 13px;
        font-size: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: background 0.1s;
      }
      .chip-opt:hover {
        background: #30363d;
      }
      .chip-opt.sel {
        background: rgba(88, 166, 255, 0.12);
        color: #58a6ff;
      }
      .chip-opt-chk {
        width: 14px;
        font-size: 11px;
        text-align: center;
        flex-shrink: 0;
      }
      .chip-opt-cnt {
        margin-left: auto;
        color: #8b949e;
        font-size: 10px;
      }

      /* Buttons */
      .i-btn {
        padding: 5px 13px;
        background: #21262d;
        color: #c9d1d9;
        border: 1.5px solid #30363d;
        border-radius: 7px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: all 0.2s;
        white-space: nowrap;
        font-family: inherit;
      }
      .i-btn:hover {
        background: #30363d;
        border-color: #58a6ff;
        color: #fff;
      }
      .i-btn.primary {
        background: #58a6ff;
        border-color: #58a6ff;
        color: #000;
        font-weight: 600;
      }
      .i-btn.primary:hover {
        background: #79b8ff;
      }
      .btn-row {
        display: flex;
        gap: 5px;
      }

      /* Stats */
      #stats {
        display: flex;
        gap: 16px;
        margin-top: 6px;
        font-size: 11px;
        color: #8b949e;
      }
      .sv {
        font-weight: 700;
        color: #58a6ff;
      }

      /* ── Canvas area ── */
      #graph-container {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      #main-canvas {
        display: block;
        cursor: grab;
      }
      #main-canvas.dragging {
        cursor: grabbing;
      }

      /* ── Tooltip ── */
      .tooltip {
        position: fixed;
        background: linear-gradient(135deg, #1f2937, #111827);
        color: #fff;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 12px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s;
        z-index: 2000;
        max-width: 280px;
        box-shadow:
          0 8px 24px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(88, 166, 255, 0.25);
        border: 1px solid #30363d;
      }
      .tooltip.show {
        opacity: 1;
      }
      .tt-slug {
        color: #8b949e;
        font-size: 10px;
        margin-bottom: 2px;
      }
      .tt-title {
        font-weight: 700;
        font-size: 13px;
        margin-bottom: 5px;
      }
      .tt-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 600;
      }
      .b-Easy {
        background: #00b8a3;
      }
      .b-Medium {
        background: #ffc01e;
        color: #333;
      }
      .b-Hard {
        background: #ef4743;
      }
      .tt-topics {
        margin-top: 6px;
      }
      .tt-comm {
        margin-top: 5px;
        font-size: 10px;
        color: #8b949e;
        font-style: italic;
      }
      .topic-tag {
        display: inline-block;
        background: rgba(255, 255, 255, 0.1);
        padding: 2px 5px;
        border-radius: 3px;
        margin: 2px;
        font-size: 10px;
      }
      .tt-link {
        display: inline-block;
        margin-top: 6px;
        font-size: 10px;
        color: #58a6ff;
      }

      /* ── Legend ── */
      .legend {
        position: absolute;
        bottom: 16px;
        right: 16px;
        background: #161b22;
        padding: 11px 14px;
        border-radius: 10px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        font-size: 11px;
        border: 1px solid #30363d;
        z-index: 10;
      }
      .legend-title {
        font-weight: 700;
        margin-bottom: 7px;
        color: #e6edf3;
        font-size: 11px;
      }
      .l-item {
        display: flex;
        align-items: center;
        gap: 7px;
        margin: 4px 0;
        font-size: 10px;
        color: #8b949e;
      }
      .l-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      /* ── Loading ── */
      #loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 16px;
        color: #58a6ff;
        font-weight: 500;
        text-align: center;
        z-index: 50;
      }
      .spinner {
        border: 3px solid #30363d;
        border-top: 3px solid #58a6ff;
        border-radius: 50%;
        width: 44px;
        height: 44px;
        animation: spin 1s linear infinite;
        margin: 0 auto 12px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Selected-node panel (bottom-left) ── */
      #sel-panel {
        position: fixed;
        bottom: 16px;
        left: 16px;
        width: 250px;
        max-height: 42vh;
        background: linear-gradient(160deg, #1a2030, #111827);
        border: 1px solid #30363d;
        border-radius: 12px;
        padding: 11px 12px 10px;
        font-size: 11px;
        color: #c9d1d9;
        z-index: 500;
        display: none;
        flex-direction: column;
        gap: 2px;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.7),
          0 0 0 1px rgba(88, 166, 255, 0.12);
        overflow: hidden;
      }
      #sel-panel.show {
        display: flex;
      }
      .sp-close {
        position: absolute;
        top: 10px;
        right: 12px;
        font-size: 16px;
        cursor: pointer;
        color: #8b949e;
        line-height: 1;
        transition: color 0.15s;
      }
      .sp-close:hover {
        color: #ef4743;
      }
      .sp-slug {
        font-size: 10px;
        color: #8b949e;
        margin-bottom: 1px;
      }
      .sp-title {
        font-size: 13px;
        font-weight: 700;
        color: #e6edf3;
        line-height: 1.35;
        padding-right: 18px;
      }
      .sp-nb-head {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #a78bfa;
        margin-top: 10px;
        margin-bottom: 4px;
      }
      .sp-nb-list {
        overflow-y: auto;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .sp-nb-list::-webkit-scrollbar {
        width: 4px;
      }
      .sp-nb-list::-webkit-scrollbar-thumb {
        background: #30363d;
        border-radius: 2px;
      }
      .nb-item {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 4px 6px;
        border-radius: 6px;
        transition: background 0.12s;
        cursor: default;
      }
      .nb-item:hover {
        background: rgba(255, 255, 255, 0.05);
      }
      .nb-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .nb-title {
        flex: 1;
        font-size: 11px;
        color: #c9d1d9;
      }

      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: #0d1117;
      }
      ::-webkit-scrollbar-thumb {
        background: #30363d;
        border-radius: 3px;
      }

      /* ── Physics Panel ── */
      #physics-panel {
        position: fixed;
        top: 16px;
        right: 16px;
        width: 260px;
        background: linear-gradient(160deg, #1a2030, #111827);
        border: 1px solid #30363d;
        border-radius: 12px;
        font-size: 12px;
        color: #c9d1d9;
        z-index: 500;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(88, 166, 255, 0.1);
        overflow: hidden;
        transition: height 0.22s ease;
      }
      #physics-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        cursor: pointer;
        user-select: none;
        background: rgba(88, 166, 255, 0.06);
        border-bottom: 1px solid #30363d;
      }
      #physics-header:hover {
        background: rgba(88, 166, 255, 0.12);
      }
      #physics-title {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #58a6ff;
      }
      #physics-chevron {
        font-size: 10px;
        color: #8b949e;
        transition: transform 0.2s;
      }
      #physics-chevron.open {
        transform: rotate(180deg);
      }
      #physics-body {
        padding: 10px 14px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 420px;
        overflow-y: auto;
      }
      #physics-body.hidden {
        display: none;
      }
      .ph-row {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .ph-label-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .ph-label {
        font-size: 10px;
        color: #8b949e;
        font-weight: 500;
      }
      .ph-val {
        font-size: 10px;
        color: #58a6ff;
        font-weight: 600;
        min-width: 38px;
        text-align: right;
      }
      .ph-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        border-radius: 2px;
        background: #30363d;
        outline: none;
        cursor: pointer;
      }
      .ph-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: #58a6ff;
        cursor: pointer;
        border: 2px solid #0d1117;
        transition: background 0.15s;
      }
      .ph-slider:hover::-webkit-slider-thumb {
        background: #79b8ff;
      }
      .ph-sep {
        border: none;
        border-top: 1px solid #30363d;
        margin: 2px 0;
      }
      .ph-section-label {
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: #58a6ff;
        font-weight: 700;
        margin-top: 2px;
      }
      #physics-apply-btn {
        width: 100%;
        padding: 6px 0;
        background: rgba(88, 166, 255, 0.15);
        border: 1px solid rgba(88, 166, 255, 0.3);
        border-radius: 7px;
        color: #58a6ff;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        margin-top: 2px;
      }
      #physics-apply-btn:hover {
        background: rgba(88, 166, 255, 0.28);
      }

      /* ── Responsive layout ── */
      @media (max-width: 1100px) {
        #header {
          padding: 10px 12px 8px;
        }
        .header-top {
          flex-wrap: wrap;
          gap: 8px;
        }
        .ship-link {
          margin-left: 0;
        }
        .controls-row {
          gap: 6px;
          align-items: stretch;
        }
        .ctrl-sep {
          display: none;
        }
        .ctrl {
          min-width: 170px;
          flex: 1 1 220px;
        }
        .chip-filter,
        .chip-row {
          min-width: 0;
          max-width: 100%;
          width: 100%;
        }
        input[type="text"] {
          width: 100%;
          min-width: 0;
        }
        #playlist-url {
          width: 100% !important;
        }
      }

      @media (max-width: 760px) {
        h1 {
          font-size: 15px;
        }
        .header-top h1 {
          width: 100%;
        }
        .header-top h1 img {
          width: 24px !important;
          height: 24px !important;
          padding: 2px !important;
        }
        .ship-link {
          width: 100%;
          text-align: center;
        }
        .controls-row {
          flex-direction: column;
        }
        .ctrl {
          width: 100%;
          min-width: 0;
          flex: 1 1 auto;
        }
        #stats {
          gap: 8px;
          flex-wrap: wrap;
          margin-top: 8px;
        }
        #sel-panel {
          width: min(90vw, 250px);
          max-height: 38vh;
          left: 10px;
          bottom: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div id="container">
      <!-- Header -->
      <div id="header">
        <div class="header-top">
          <h1 style="display: flex; align-items: center; gap: 8px">
            <img
              src="../node.png"
              alt="leetGraph logo"
              style="width: 30px; height: 30px; object-fit: contain; background-color: white; border-radius: 50%; padding: 3px;"
            />
            <span>Leet Graph</span>
          </h1>
          <a
            class="ship-link"
            href="https://www.linkedin.com/in/srisowrirajan-k-s/"
            target="_blank"
            rel="noopener noreferrer"
            >Shipped with style by Sriman</a
          >
        </div>
        <div class="controls-row">
          <div class="ctrl">
            <div class="ctrl-label">Search</div>
            <input type="text" id="search" placeholder="Title or slug…" />
          </div>

          <div class="ctrl-sep"></div>

          <div class="ctrl">
            <div class="ctrl-label">Difficulty</div>
            <div class="d-chips">
              <span class="d-chip all active" data-diff="all">All</span>
              <span class="d-chip Easy" data-diff="Easy">Easy</span>
              <span class="d-chip Medium" data-diff="Medium">Medium</span>
              <span class="d-chip Hard" data-diff="Hard">Hard</span>
            </div>
          </div>

          <div class="ctrl-sep"></div>

          <div class="ctrl">
            <div class="ctrl-label">
              Topics
              <span
                id="topic-badge"
                style="color: #58a6ff; font-weight: 400"
              ></span>
            </div>
            <div class="chip-filter" id="chip-filter">
              <div class="chip-row" id="chip-row">
                <input
                  class="chip-search"
                  id="chip-input"
                  placeholder="Filter topics…"
                  autocomplete="off"
                />
              </div>
              <div class="chip-dd" id="chip-dd"></div>
            </div>
          </div>

          <div class="ctrl-sep"></div>

          <div class="ctrl">
            <div class="ctrl-label">Controls</div>
            <div class="btn-row">
              <button class="i-btn" id="reset-btn">↺ Reset</button>
              <button class="i-btn primary" id="center-btn">⊕ Center</button>
            </div>
          </div>

          <div class="ctrl-sep"></div>

          <div class="ctrl" style="flex-shrink: 0">
            <div
              class="ctrl-label"
              style="
                display: flex;
                align-items: center;
                justify-content: space-between;
                width: 100%;
              "
            >
              <span>🎵 Playlist</span>
              <span
                id="playlist-status"
                style="font-size: 10px; color: #8b949e; font-weight: 500"
              ></span>
            </div>
            <div style="display: flex; gap: 4px; align-items: center">
              <input
                type="text"
                id="playlist-url"
                placeholder="LeetCode list URL…"
                style="width: 180px"
              />
              <button class="i-btn" id="playlist-load-btn">Load</button>
              <button
                class="i-btn"
                id="playlist-clear-btn"
                style="display: none; padding: 5px 7px"
                title="Clear"
              >
                ✕
              </button>
            </div>
          </div>
        </div>

        <div id="stats">
          <div>Nodes: <span class="sv" id="s-nodes">0</span></div>
          <div>Edges: <span class="sv" id="s-edges">0</span></div>
          <div style="color: #58a6ff; font-size: 10px; margin-left: 4px">
            Hover a node • Scroll/drag to navigate • Best viewed on laptop/desktop
          </div>
        </div>
      </div>

      <!-- Graph area -->
      <div id="graph-container">
        <div id="loading">
          <div class="spinner"></div>
          Loading universe…
        </div>
        <canvas id="main-canvas"></canvas>

        <div class="legend">
          <div class="legend-title">Difficulty</div>
          <div class="l-item">
            <div class="l-dot" style="background: #00b8a3"></div>
            Easy
          </div>
          <div class="l-item">
            <div class="l-dot" style="background: #ffc01e"></div>
            Medium
          </div>
          <div class="l-item">
            <div class="l-dot" style="background: #ef4743"></div>
            Hard
          </div>
        </div>
      </div>

      <div class="tooltip" id="tooltip"></div>
      <div id="sel-panel">
        <!-- populated by JS -->
      </div>
    </div>

    <script>
      // ══════════════════════════════════════════════════════════════
      //  CONSTANTS & STATE
      // ══════════════════════════════════════════════════════════════
      const DIFF_COLOR = {
        Easy: "#00b8a3",
        Medium: "#ffc01e",
        Hard: "#ef4743",
        Unknown: "#58a6ff",
      };
      const TOPIC_COLORS = {
        "Dynamic Programming": "#00d4ff",
        "Graph Theory": "#39ff14",
        Array: "#ff6a00",
        String: "#ff00ff",
        Tree: "#ffe600",
        "Binary Tree": "#ffe600",
        "Depth-First Search": "#00ff99",
        "Breadth-First Search": "#00ffcc",
        Greedy: "#ff3399",
        "Sliding Window": "#ff9900",
        "Binary Search": "#b44dff",
        "Hash Table": "#ff4757",
        Math: "#ffd700",
        "Bit Manipulation": "#00bfff",
        Sorting: "#a8ff3e",
        Backtracking: "#ff6b81",
        Stack: "#ff8c42",
        "Heap (Priority Queue)": "#c77dff",
        "Linked List": "#74c0fc",
        "Two Pointers": "#ff9f43",
        "Union-Find": "#26de81",
        Trie: "#a29bfe",
        Matrix: "#81ecec",
        "Prefix Sum": "#55efc4",
      };

      let curDiff = "all";
      let topicSel = new Set();
      let showLabels = true;
      let playlistSlugs = null; // Set<slug> when a playlist is active, null = no filter

      // ── Physics config (driven by UI sliders) ─────────────────────
      const PHYS = {
        spreadX: 550,
        spreadY: 100,
        intraSpread: 160,
        repelStr: 14000,
        repelMaxD: 700,
        attractThresh: 850,
        attractStr: 0.003,
        cohesionStr: 0.018,
        cohesionThresh: 180,
        linkDistInter: 350,
        linkStrInter: 0.08,
        chargeStr: -90,
        collidePad: 10,
      };

      // Node drag state
      let draggedNode = null;
      let isDraggingNode = false;

      let allNodes = [],
        allEdges = [],
        allTopics = [],
        topicCnt = {};
      let communities = {};
      let simulation = null;
      let nodeMap = {}; // id → node obj
      let adjMap = {}; // id → Set<id>
      let commGroups = {}; // commId → [nodeId...]

      // Canvas / transform state
      let canvas, ctx;
      let transform = d3.zoomIdentity;
      let W, H;

      // Interaction state
      let hoveredNode = null;
      let selectedNode = null; // pinned on click
      let searchHit = null;
      let animFrame = null;

      function shouldShowHoverTooltip() {
        return !(
          window.matchMedia("(max-width: 760px)").matches ||
          window.matchMedia("(pointer: coarse)").matches
        );
      }

      // ══════════════════════════════════════════════════════════════
      //  LOAD & INIT
      // ══════════════════════════════════════════════════════════════
      async function init() {
        try {
          const res = await fetch("graph.json");
          const data = await res.json();
          allNodes = data.nodes;
          allEdges = data.edges;
          communities = data.communities || {};
        } catch (e) {
          document.getElementById("loading").innerHTML =
            '<div style="color:#ef4743">❌ Failed to load graph.json</div>';
          return;
        }

        // Filter out Unknown nodes natively
        allNodes = allNodes.filter(
          (n) => n.difficulty && n.difficulty !== "Unknown",
        );
        const validIds = new Set(allNodes.map((n) => n.id));
        allEdges = allEdges.filter(
          (e) => validIds.has(e.source) && validIds.has(e.target),
        );

        // Build adjacency + topic counts
        allNodes.forEach((n) => {
          nodeMap[n.id] = n;
          adjMap[n.id] = new Set();
          (n.topics || []).forEach((t) => {
            topicCnt[t] = (topicCnt[t] || 0) + 1;
          });
          const cid = String(n.community);
          if (!commGroups[cid]) commGroups[cid] = [];
          commGroups[cid].push(n.id);
        });
        allEdges.forEach((e) => {
          if (adjMap[e.source]) adjMap[e.source].add(e.target);
          if (adjMap[e.target]) adjMap[e.target].add(e.source);
        });

        allTopics = Object.keys(topicCnt).sort(
          (a, b) => topicCnt[b] - topicCnt[a],
        );

        // Connection degree for node sizing
        allNodes.forEach((n) => {
          n._deg = adjMap[n.id] ? adjMap[n.id].size : 0;
          n._color = DIFF_COLOR[n.difficulty] || DIFF_COLOR.Unknown;
          n._r = Math.min(4 + n._deg * 0.8, 18);
        });

        buildDropdown();
        setupCanvas();
        buildFilters();

        document.getElementById("loading").style.display = "none";

        applyFilters();
      }

      // ══════════════════════════════════════════════════════════════
      //  CANVAS SETUP
      // ══════════════════════════════════════════════════════════════
      function setupCanvas() {
        const container = document.getElementById("graph-container");
        canvas = document.getElementById("main-canvas");
        ctx = canvas.getContext("2d");
        resize();
        window.addEventListener("resize", resize);

        // Zoom & pan via d3-zoom on the canvas element
        const zoom = d3
          .zoom()
          .scaleExtent([0.03, 16])
          .on("zoom", (ev) => {
            transform = ev.transform;
            redraw();
          });

        d3.select(canvas).call(zoom);

        // Store zoom ref for center/reset
        canvas._zoom = zoom;

        // Hover + click detection
        canvas.addEventListener("mousemove", onMouseMove);
        canvas.addEventListener("mouseleave", () => {
          hoveredNode = null;
          hideTooltip();
          if (!isDraggingNode) redraw();
        });
        canvas.addEventListener("click", (e) => {
          // Don't fire click after a drag
          if (e.defaultPrevented || isDraggingNode) return;
          const n = pickNode(e);
          if (n && n !== selectedNode) {
            selectedNode = n;
            showSelectedPanel(n);
          } else {
            selectedNode = null;
            hideSelectedPanel();
          }
          redraw();
        });

        // ── Node dragging via pointer events ──────────────────────────
        canvas.addEventListener("pointerdown", (e) => {
          if (e.button !== 0) return;
          const hit = pickNode(e);
          if (!hit) return;
          // Found a node — take over from d3-zoom
          e.stopPropagation();
          draggedNode = hit;
          isDraggingNode = false; // will flip true on first move
          // Fix node in place so simulation doesn't fight the drag
          hit.fx = hit.x;
          hit.fy = hit.y;
          if (simulation) simulation.alphaTarget(0.15).restart();
          canvas.setPointerCapture(e.pointerId);
          canvas.style.cursor = "grabbing";
        });

        canvas.addEventListener("pointermove", (e) => {
          if (!draggedNode) return;
          isDraggingNode = true;
          const rect = canvas.getBoundingClientRect();
          draggedNode.fx = transform.invertX(e.clientX - rect.left);
          draggedNode.fy = transform.invertY(e.clientY - rect.top);
          if (simulation) simulation.alphaTarget(0.15).restart();
        });

        const endDrag = (e) => {
          if (!draggedNode) return;
          isDraggingNode = false;
          // Release: unfix so the physics takes over again
          draggedNode.fx = null;
          draggedNode.fy = null;
          if (simulation) simulation.alphaTarget(0).restart();
          draggedNode = null;
          canvas.style.cursor = "grab";
        };
        canvas.addEventListener("pointerup", endDrag);
        canvas.addEventListener("pointercancel", endDrag);
      }

      function resize() {
        const container = document.getElementById("graph-container");
        W = container.clientWidth;
        H = container.clientHeight;
        canvas.width = W * devicePixelRatio;
        canvas.height = H * devicePixelRatio;
        canvas.style.width = W + "px";
        canvas.style.height = H + "px";
        ctx.scale(devicePixelRatio, devicePixelRatio);
        redraw();
      }

      // ══════════════════════════════════════════════════════════════
      //  TOPIC DROPDOWN
      // ══════════════════════════════════════════════════════════════
      function buildDropdown() {
        const dd = document.getElementById("chip-dd");
        dd.innerHTML = "";
        const q = (
          document.getElementById("chip-input").value || ""
        ).toLowerCase();
        allTopics
          .filter((t) => !q || t.toLowerCase().includes(q))
          .forEach((t) => {
            const d = document.createElement("div");
            d.className = "chip-opt" + (topicSel.has(t) ? " sel" : "");
            d.innerHTML = `<span class="chip-opt-chk">${topicSel.has(t) ? "✓" : ""}</span>
                   <span>${t}</span>
                   <span class="chip-opt-cnt">${topicCnt[t] || 0}</span>`;
            d.addEventListener("mousedown", (e) => {
              e.preventDefault();
              toggleTopic(t);
            });
            dd.appendChild(d);
          });
      }

      function toggleTopic(t) {
        if (topicSel.has(t)) topicSel.delete(t);
        else topicSel.add(t);
        renderChips();
        buildDropdown();
        document.getElementById("topic-badge").textContent = topicSel.size
          ? `(${topicSel.size})`
          : "";
        applyFilters();
      }

      function renderChips() {
        const row = document.getElementById("chip-row");
        row.querySelectorAll(".chip").forEach((c) => c.remove());
        [...topicSel].forEach((t) => {
          const chip = document.createElement("span");
          chip.className = "chip";
          chip.innerHTML = `${t}<span class="chip-x" data-t="${t}">×</span>`;
          chip
            .querySelector(".chip-x")
            .addEventListener("click", () => toggleTopic(t));
          row.insertBefore(chip, document.getElementById("chip-input"));
        });
      }

      // ══════════════════════════════════════════════════════════════
      //  FILTER WIRING
      // ══════════════════════════════════════════════════════════════
      function buildFilters() {
        // Difficulty chips
        document.querySelectorAll(".d-chip").forEach((el) => {
          el.addEventListener("click", () => {
            document
              .querySelectorAll(".d-chip")
              .forEach((c) => c.classList.remove("active"));
            el.classList.add("active");
            curDiff = el.dataset.diff;
            applyFilters();
          });
        });

        // Search
        let searchTimer;
        document.getElementById("search").addEventListener("input", () => {
          clearTimeout(searchTimer);
          searchTimer = setTimeout(applyFilters, 200);
        });

        // Chip input
        const chipInput = document.getElementById("chip-input");
        const chipFilter = document.getElementById("chip-filter");
        const dd = document.getElementById("chip-dd");

        chipInput.addEventListener("focus", () => {
          dd.classList.add("open");
        });
        chipInput.addEventListener("input", () => buildDropdown());
        document.addEventListener("click", (e) => {
          if (!chipFilter.contains(e.target)) dd.classList.remove("open");
        });

        // Reset / Center / Labels
        document.getElementById("reset-btn").addEventListener("click", () => {
          d3.select(canvas).call(canvas._zoom.transform, d3.zoomIdentity);
          curDiff = "all";
          topicSel.clear();
          renderChips();
          buildDropdown();
          document.getElementById("topic-badge").textContent = "";
          document.getElementById("search").value = "";
          document
            .querySelectorAll(".d-chip")
            .forEach((c) => c.classList.remove("active"));
          document.querySelector(".d-chip.all").classList.add("active");
          // Clear cached positions so horizontal spawn re-applies
          allNodes.forEach((n) => {
            n._sx = undefined;
            n._sy = undefined;
          });
          applyFilters();
        });

        document.getElementById("center-btn").addEventListener("click", () => {
          autoFit();
        });

        // ── Playlist filter ───────────────────────────────────────────
        async function loadPlaylist() {
          const raw = document.getElementById("playlist-url").value.trim();
          if (!raw) return;
          const statusEl = document.getElementById("playlist-status");
          const clearBtn = document.getElementById("playlist-clear-btn");
          statusEl.textContent = "⏳ Fetching…";
          statusEl.style.color = "#58a6ff";

          // Extract list id from various URL shapes:
          //   /list/?selectedList=abc   /problem-list/abc/   /list/abc
          let listId = null;
          try {
            const u = new URL(raw);
            listId =
              u.searchParams.get("selectedList") ||
              u.pathname.match(/\/problem-list\/([^/]+)/)?.[1] ||
              u.pathname.match(/\/list\/([^/]+)/)?.[1];
          } catch (_) {
            listId = raw.trim(); // fallback: treat raw string as id
          }
          if (!listId) {
            statusEl.textContent =
              "❌ Can't parse URL — paste a LeetCode list link";
            statusEl.style.color = "#ef4743";
            return;
          }

          try {
            const gql = `query favoriteQuestionList($favoriteSlug: String!) { favoriteQuestionList(favoriteSlug: $favoriteSlug) { questions { titleSlug } } }`;
            const res = await fetch("https://corsproxy.io/?https://leetcode.com/graphql", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                query: gql,
                variables: { favoriteSlug: listId }
              }),
            });
            const json = await res.json();
            const qs = json?.data?.favoriteQuestionList?.questions || [];
            if (!qs.length)
              throw new Error(
                "No problems returned (check list ID or privacy)",
              );
            playlistSlugs = new Set(qs.map((q) => q.titleSlug));
            statusEl.textContent = `✓ ${playlistSlugs.size} problems`;
            statusEl.style.color = "#00b8a3";
            clearBtn.style.display = "";
            applyFilters();
          } catch (err) {
            statusEl.textContent = `❌ ${err.message || "Fetch failed — CORS or private list"}`;
            statusEl.style.color = "#ef4743";
          }
        }

        document
          .getElementById("playlist-load-btn")
          .addEventListener("click", loadPlaylist);
        document
          .getElementById("playlist-url")
          .addEventListener("keydown", (e) => {
            if (e.key === "Enter") loadPlaylist();
          });
        document
          .getElementById("playlist-clear-btn")
          .addEventListener("click", () => {
            playlistSlugs = null;
            document.getElementById("playlist-url").value = "";
            document.getElementById("playlist-status").textContent = "";
            document.getElementById("playlist-clear-btn").style.display =
              "none";
            applyFilters();
          });
      }

      // ══════════════════════════════════════════════════════════════
      //  FILTER & SIMULATION
      // ══════════════════════════════════════════════════════════════
      let visNodes = [],
        visEdges = [],
        visSet = new Set();
      let simNodes = [],
        simLinks = [];
      let edgesReady = false;

      function applyFilters() {
        const q = document.getElementById("search").value.toLowerCase().trim();

        visNodes = allNodes.filter((n) => {
          if (curDiff !== "all" && n.difficulty !== curDiff) return false;
          if (
            topicSel.size > 0 &&
            !(n.topics || []).some((t) => topicSel.has(t))
          )
            return false;
          if (q && !n.title.toLowerCase().includes(q) && !n.id.includes(q))
            return false;
          if (playlistSlugs && !playlistSlugs.has(n.id)) return false;
          return true;
        });
        visSet = new Set(visNodes.map((n) => n.id));
        visEdges = allEdges.filter(
          (e) => visSet.has(e.source) && visSet.has(e.target),
        );

        document.getElementById("s-nodes").textContent = visNodes.length;
        document.getElementById("s-edges").textContent = visEdges.length;

        runSimulation();
      }

      function runSimulation() {
        edgesReady = false;
        if (simulation) {
          simulation.stop();
          simulation = null;
        }
        if (!visNodes.length) {
          redraw();
          return;
        }

        // ── Build community membership maps (O(n), done once) ─────────
        const visCommMap = {}; // commId → [nodeIds]
        const nodeCommId = {}; // nodeId → commId  (fast lookup)
        visNodes.forEach((n) => {
          const cid = String(n.community);
          nodeCommId[n.id] = cid;
          if (!visCommMap[cid]) visCommMap[cid] = [];
          visCommMap[cid].push(n.id);
        });
        const commIds = Object.keys(visCommMap);
        const numComms = commIds.length;

        // ── Spawn clusters on a horizontal axis with slight vertical spread ──
        const SPREAD_X = PHYS.spreadX;
        const SPREAD_Y = PHYS.spreadY;
        const INTRA_SPREAD = PHYS.intraSpread;

        const commAnchor = {};
        commIds.forEach((cid, idx) => {
          const ax = (idx - (numComms - 1) / 2) * SPREAD_X;
          const ay = (Math.random() - 0.5) * SPREAD_Y;
          commAnchor[cid] = { ax, ay };
        });

        simNodes = visNodes.map((n) => {
          const cid = String(n.community);
          const anchor = commAnchor[cid] || { ax: 0, ay: 0 };
          return {
            ...n,
            x: n._sx ?? anchor.ax + (Math.random() - 0.5) * INTRA_SPREAD,
            y: n._sy ?? anchor.ay + (Math.random() - 0.5) * INTRA_SPREAD,
          };
        });

        // Pre-build fast id→simNode index
        const idToSimIdx = {};
        simNodes.forEach((n, i) => {
          idToSimIdx[n.id] = i;
        });

        // Pre-build per-edge community membership (O(edges), done once)
        simLinks = visEdges
          .map((e) => ({
            source: idToSimIdx[e.source],
            target: idToSimIdx[e.target],
            _inter: nodeCommId[e.source] !== nodeCommId[e.target],
          }))
          .filter((l) => l.source !== undefined && l.target !== undefined);

        // Build per-simNode community index (array position → cid string)
        // Used inside tick forces without any map/find calls
        const simNodeCid = simNodes.map((n) => String(n.community));

        // ── Custom force: inter-community centroid repulsion/attraction ─
        // O(communities² + nodes) per tick — safe for ~20-50 communities
        function forceCommunityLayout(alpha) {
          // 1. Accumulate centroids (O(n))
          const cx = {},
            cy = {},
            cnt = {};
          for (let i = 0; i < simNodes.length; i++) {
            const cid = simNodeCid[i];
            const n = simNodes[i];
            cx[cid] = (cx[cid] || 0) + n.x;
            cy[cid] = (cy[cid] || 0) + n.y;
            cnt[cid] = (cnt[cid] || 0) + 1;
          }
          const centX = {},
            centY = {};
          for (const cid of commIds) {
            if (!cnt[cid]) continue;
            centX[cid] = cx[cid] / cnt[cid];
            centY[cid] = cy[cid] / cnt[cid];
          }

          // 2. Compute per-community force delta (O(communities²))
          const fdx = {},
            fdy = {};
          commIds.forEach((cid) => {
            fdx[cid] = 0;
            fdy[cid] = 0;
          });

          const REPEL_STR = PHYS.repelStr;
          const REPEL_MAX_D = PHYS.repelMaxD;
          const ATTRACT_THRESH = PHYS.attractThresh;
          const ATTRACT_STR = PHYS.attractStr;
          const COHESION_STR = PHYS.cohesionStr;
          const COHESION_THRESH = PHYS.cohesionThresh;

          for (let i = 0; i < commIds.length; i++) {
            for (let j = i + 1; j < commIds.length; j++) {
              const a = commIds[i],
                b = commIds[j];
              if (centX[a] === undefined || centX[b] === undefined) continue;
              const dx = centX[b] - centX[a];
              const dy = centY[b] - centY[a];
              const dist = Math.sqrt(dx * dx + dy * dy) || 1;

              let forceX, forceY;
              if (dist < ATTRACT_THRESH) {
                // Repel communities apart
                const d = Math.min(dist, REPEL_MAX_D);
                const s = (REPEL_STR / (d * d)) * alpha;
                forceX = (dx / dist) * s;
                forceY = (dy / dist) * s;
                fdx[a] -= forceX;
                fdy[a] -= forceY;
                fdx[b] += forceX;
                fdy[b] += forceY;
              } else {
                // Attract back if communities drifted too far
                const over = dist - ATTRACT_THRESH;
                const s = over * ATTRACT_STR * alpha;
                forceX = (dx / dist) * s;
                forceY = (dy / dist) * s;
                fdx[a] += forceX;
                fdy[a] += forceY;
                fdx[b] -= forceX;
                fdy[b] -= forceY;
              }
            }
          }

          // 3. Apply community force + individual cohesion to nodes (O(n))
          for (let i = 0; i < simNodes.length; i++) {
            const n = simNodes[i];
            const cid = simNodeCid[i];

            // Community-wide push/pull
            n.vx += fdx[cid] || 0;
            n.vy += fdy[cid] || 0;

            // Cohesion: pull node toward its community centroid if too far out
            if (centX[cid] !== undefined) {
              const dx = centX[cid] - n.x;
              const dy = centY[cid] - n.y;
              const dist = Math.sqrt(dx * dx + dy * dy) || 1;
              if (dist > COHESION_THRESH) {
                const s = (dist - COHESION_THRESH) * COHESION_STR * alpha;
                n.vx += (dx / dist) * s;
                n.vy += (dy / dist) * s;
              }
            }
          }
        }

        simulation = d3
          .forceSimulation(simNodes)
          // Cross-community edges pull similar-topic clusters gently together
          .force(
            "link",
            d3
              .forceLink(simLinks)
              .distance((l) => (l._inter ? PHYS.linkDistInter : 65))
              .strength((l) => (l._inter ? PHYS.linkStrInter : 0.3)),
          )
          // Light global repulsion to prevent node pile-ups (barnes-hut, efficient)
          .force(
            "charge",
            d3.forceManyBody().strength(PHYS.chargeStr).distanceMax(280),
          )
          // Soft gravity to keep the whole graph centred
          .force("center", d3.forceCenter(0, 0).strength(0.01))
          // Collision gives intra-cluster spacing without O(n²) math
          .force(
            "collide",
            d3.forceCollide((d) => d._r + PHYS.collidePad).strength(0.85),
          )
          // Community-level repulsion/attraction (efficient centroid-based)
          .force("community", forceCommunityLayout)
          .alphaDecay(0.014)
          .velocityDecay(0.4)
          .on("tick", () => {
            simNodes.forEach((n) => {
              nodeMap[n.id]._sx = n.x;
              nodeMap[n.id]._sy = n.y;
            });
            // Delay expensive edge rendering until layout calms down.
            if (!edgesReady && simulation.alpha() < 0.08) edgesReady = true;
            redraw();
          })
          .on("end", () => {
            edgesReady = true;
            redraw();
          });
      }

      function autoFit() {
        if (!simNodes.length) return;
        const xs = simNodes.map((n) => n.x);
        const ys = simNodes.map((n) => n.y);
        const minX = Math.min(...xs),
          maxX = Math.max(...xs);
        const minY = Math.min(...ys),
          maxY = Math.max(...ys);
        const rangeX = maxX - minX + 80,
          rangeY = maxY - minY + 80;
        const scale = Math.min(W / rangeX, H / rangeY, 1.2) * 0.88;
        const midX = (minX + maxX) / 2,
          midY = (minY + maxY) / 2;
        d3.select(canvas)
          .transition()
          .duration(800)
          .call(
            canvas._zoom.transform,
            d3.zoomIdentity
              .translate(W / 2 - midX * scale, H / 2 - midY * scale)
              .scale(scale),
          );
      }

      // ══════════════════════════════════════════════════════════════
      //  DRAW
      // ══════════════════════════════════════════════════════════════
      function worldToScreen(x, y) {
        return [transform.applyX(x), transform.applyY(y)];
      }

      function redraw() {
        ctx.save();
        ctx.clearRect(0, 0, W, H);

        // Background
        ctx.fillStyle = "#0d1117";
        ctx.fillRect(0, 0, W, H);

        if (!simNodes.length) {
          ctx.restore();
          return;
        }

        const hov = hoveredNode;
        const hovId = hov ? hov.id : null;

        // ── Active Selection Logic ──
        // A label click stores {isLabel:true, cid:"..."} in selectedNode
        let activeId = null;
        let activeNeighbours = null;
        let selId = null;
        let activeCid = null; // if a whole community is selected/hovered

        if (hovId) {
          activeId = hovId;
          activeNeighbours = adjMap[activeId];
          activeCid = nodeMap[activeId]?.community
            ? String(nodeMap[activeId].community)
            : null;
        } else if (selectedNode) {
          selId = selectedNode.id;
          activeId = selId;
          activeNeighbours = adjMap[activeId];
          activeCid = nodeMap[activeId]?.community
            ? String(nodeMap[activeId].community)
            : null;
        }

        // Links
        const activeSet = activeNeighbours || new Set();
        if (edgesReady) {
          simLinks.forEach((l) => {
            const src = simNodes[l.source.index ?? l.source];
            const tgt = simNodes[l.target.index ?? l.target];
            if (!src || !tgt) return;

            const [x1, y1] = worldToScreen(src.x, src.y);
            const [x2, y2] = worldToScreen(tgt.x, tgt.y);
            const touchesActive =
              activeId && (src.id === activeId || tgt.id === activeId);
            const nbNb =
              selId &&
              !hovId &&
              activeNeighbours &&
              activeNeighbours.has(src.id) &&
              activeNeighbours.has(tgt.id);

            let edgeAlpha, lw;
            if (touchesActive) {
              edgeAlpha = hovId ? 0.92 : 0.82;
              lw = selId && !hovId ? 2.2 : 1.5;
            } else if (nbNb) {
              edgeAlpha = 0.5;
              lw = 1.2;
            } else {
              edgeAlpha = activeId ? 0.03 : 0.18;
              lw = 0.6;
            }
            ctx.globalAlpha = edgeAlpha;
            ctx.lineWidth = lw;

            // Gradient: source node colour → target node colour
            const isHighlit = touchesActive || nbNb;
            if (isHighlit) {
              const grad = ctx.createLinearGradient(x1, y1, x2, y2);
              grad.addColorStop(0, src._color || "#58a6ff");
              grad.addColorStop(1, tgt._color || "#a78bfa");
              ctx.strokeStyle = grad;
            } else {
              ctx.strokeStyle = "#1c3050";
            }

            // Cross-community highlighted edges: gentle curve for visual clarity
            ctx.beginPath();
            if (l._inter && isHighlit) {
              const mx = (x1 + x2) / 2,
                my = (y1 + y2) / 2;
              const dx = x2 - x1,
                dy = y2 - y1;
              const len = Math.sqrt(dx * dx + dy * dy) || 1;
              const bend = Math.min(len * 0.2, 55);
              ctx.moveTo(x1, y1);
              ctx.quadraticCurveTo(
                mx - (dy / len) * bend,
                my + (dx / len) * bend,
                x2,
                y2,
              );
            } else {
              ctx.moveTo(x1, y1);
              ctx.lineTo(x2, y2);
            }
            ctx.stroke();
          });
        }
        ctx.globalAlpha = 1;

        // Nodes
        simNodes.forEach((n) => {
          const [sx, sy] = worldToScreen(n.x, n.y);
          const r = n._r * Math.max(0.5, Math.min(2, transform.k * 0.8));
          const isHov = hovId === n.id;
          const isSel = selId === n.id;
          const isActiveNeighbour = activeSet.has(n.id);
          const dimmed = activeId && !isHov && !isSel && !isActiveNeighbour;
          const alpha = dimmed ? 0.25 : 0.95;
          const glowR = Math.max(r * 1.35, 8);

          ctx.globalAlpha = alpha;

          // Glow for hovered or selected
          if ((isHov || isSel) && r > 1.5) {
            const g = ctx.createRadialGradient(
              sx,
              sy,
              r * 0.3,
              sx,
              sy,
              glowR * 2.2,
            );
            g.addColorStop(0, n._color + "cc");
            g.addColorStop(1, "transparent");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(sx, sy, glowR * 2.2, 0, Math.PI * 2);
            ctx.fill();
          }

          // Circle
          ctx.beginPath();
          ctx.arc(sx, sy, Math.max(r, 1.5), 0, Math.PI * 2);
          ctx.fillStyle = n._color;
          ctx.fill();

          // Ring stroke: white for hover, gold for selected
          if (isHov || isSel) {
            ctx.strokeStyle = isSel && !isHov ? "#f0c040" : "#ffffff";
            ctx.lineWidth = isSel ? 2 : 1.5;
            ctx.stroke();
          }
        });
        ctx.globalAlpha = 1;

        ctx.restore();
      }

      // ══════════════════════════════════════════════════════════════

      function drawWrappedLabel(ctx, text, x, y, maxWidth, scale) {
        const fontSize = Math.max(9, Math.min(12, 10 * scale));
        ctx.font = `500 ${fontSize}px Inter, Segoe UI, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "bottom";

        // Strip surrounding quotes like "The 'X' Family" → keep as-is but wrap
        const words = text.split(" ");
        const lines = [];
        let cur = "";
        words.forEach((w) => {
          const test = cur ? cur + " " + w : w;
          if (ctx.measureText(test).width > maxWidth && cur) {
            lines.push(cur);
            cur = w;
          } else cur = test;
        });
        if (cur) lines.push(cur);

        const lineH = fontSize * 1.25;
        const totalH = lines.length * lineH;
        const padX = 5,
          padY = 3;

        // Max line width for bg box
        let maxW = 0;
        lines.forEach((l) => {
          const w = ctx.measureText(l).width;
          if (w > maxW) maxW = w;
        });

        const bx = x - maxW / 2 - padX;
        const by = y - totalH - padY;
        const bw = maxW + padX * 2;
        const bh = totalH + padY * 2;

        // Background pill
        ctx.globalAlpha = 0.72;
        ctx.fillStyle = "#0d1117";
        roundRect(ctx, bx, by, bw, bh, 4);
        ctx.fill();
        ctx.globalAlpha = 1;

        lines.forEach((line, i) => {
          const ly = y - (lines.length - 1 - i) * lineH - padY;
          ctx.fillStyle = "rgba(180,210,255,0.82)";
          ctx.fillText(line, x, ly);
        });
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      // ══════════════════════════════════════════════════════════════
      //  HOVER / CLICK
      // ══════════════════════════════════════════════════════════════
      function pickNode(e) {
        const rect = canvas.getBoundingClientRect();
        const wx = transform.invertX(e.clientX - rect.left);
        const wy = transform.invertY(e.clientY - rect.top);

        let best = null,
          bestD2 = Infinity;
        simNodes.forEach((n) => {
          const dx = n.x - wx,
            dy = n.y - wy;
          const d2 = dx * dx + dy * dy;
          const threshold = (n._r + 5 / transform.k) ** 2;
          if (d2 < threshold && d2 < bestD2) {
            bestD2 = d2;
            best = n;
          }
        });
        return best;
      }

      function onMouseMove(e) {
        if (!shouldShowHoverTooltip()) {
          hoveredNode = null;
          hideTooltip();
          redraw();
          return;
        }
        const best = pickNode(e);
        if (best !== hoveredNode) {
          hoveredNode = best;
          redraw();
          if (best) showTooltip(best, e.clientX, e.clientY);
          else hideTooltip();
        } else if (best) {
          moveTooltip(e.clientX, e.clientY);
        }
      }

      const tooltip = document.getElementById("tooltip");
      const selPanel = document.getElementById("sel-panel");

      function showTooltip(n, cx, cy) {
        if (!shouldShowHoverTooltip()) return;
        const diff = n.difficulty || "Unknown";
        const topics = (n.topics || [])
          .map((t) => `<span class='topic-tag'>${t}</span>`)
          .join("");
        tooltip.innerHTML = `
          <div class='tt-slug'>${n.id}</div>
          <div class='tt-title'>${n.title}</div>
          <span class='tt-badge b-${diff}'>${diff}</span>
          <div class='tt-topics'>${topics}</div>`;
        moveTooltip(cx, cy);
        tooltip.classList.add("show");
      }
      function moveTooltip(cx, cy) {
        let left = cx - tooltip.offsetWidth / 2;
        let top = cy - tooltip.offsetHeight - 14;
        if (top < 10) top = cy + 14;
        if (left < 8) left = 8;
        if (left + tooltip.offsetWidth > window.innerWidth - 8)
          left = window.innerWidth - tooltip.offsetWidth - 8;
        tooltip.style.left = left + "px";
        tooltip.style.top = top + "px";
      }
      function hideTooltip() {
        tooltip.classList.remove("show");
      }

      function showSelectedPanel(n) {
        const diff = n.difficulty || "Unknown";
        const comm = communities[String(n.community)];
        const topics = (n.topics || [])
          .map((t) => `<span class='topic-tag'>${t}</span>`)
          .join("");
        // First-degree neighbours sorted by degree desc
        const neighbours = [...(adjMap[n.id] || [])]
          .map((id) => nodeMap[id])
          .filter(Boolean)
          .filter((nb) => visSet.has(nb.id))
          .sort((a, b) => b._deg - a._deg)
          .slice(0, 16);
        const nbHtml = neighbours.length
          ? neighbours
              .map(
                (nb) => `
            <div class='nb-item'>
              <span class='nb-dot' style='background:${nb._color}'></span>
              <span class='nb-title'>${nb.title}</span>
              <span class='tt-badge b-${nb.difficulty || "Unknown"}' style='font-size:9px;padding:1px 5px'>${nb.difficulty || "?"}</span>
            </div>`,
              )
              .join("")
          : '<div style="color:#5a7a8a;font-size:11px">No visible neighbours</div>';

        selPanel.innerHTML = `
          <div class='sp-close' id='sp-close'>×</div>
          <div class='sp-slug'>${n.id}</div>
          <div class='sp-title'>${n.title}</div>
          <div style='margin:6px 0'>
            <span class='tt-badge b-${diff}'>${diff}</span>
          </div>
          <div class='tt-topics' style='margin-bottom:6px'>${topics}</div>
          ${comm && comm.name ? `<div class='tt-comm'>🔬 ${comm.name}</div>` : ""}
          <a class='tt-link' href='https://leetcode.com/problems/${n.id}/' target='_blank' rel='noopener'>↗ Open on LeetCode</a>
          <div class='sp-nb-head'>First-degree neighbours (${neighbours.length})</div>
          <div class='sp-nb-list'>${nbHtml}</div>`;
        selPanel.classList.add("show");
        document.getElementById("sp-close").addEventListener("click", (e) => {
          e.stopPropagation();
          selectedNode = null;
          hideSelectedPanel();
          redraw();
        });
      }
      function hideSelectedPanel() {
        selPanel.classList.remove("show");
      }

      // ══════════════════════════════════════════════════════════════
      //  BOOTSTRAP
      // ══════════════════════════════════════════════════════════════
      init();
      
    </script>
